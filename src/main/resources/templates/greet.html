<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script th:src="@{/js/app.js}"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

<div class="bg-white p-8 rounded-xl shadow-md text-center w-full max-w-md">

    <!-- Logo dipindah ke body -->
    <img th:src="@{/images/logo.png}"
         alt="Logo"
         class="w-20 mx-auto mb-4">

    <h1 class="text-3xl font-semibold text-gray-800"
        th:text="${greeting}">
        Greeting
    </h1>

    <a th:href="@{/}"
       class="inline-block mt-6 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
        Home
    </a>

</div>

</body>
</html>
